# Supabase project config
# Run: supabase init (if not already), then supabase link --project-ref <your-project-ref>

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# -------------------------------------------------------
# AI News Agent — runs every hour
# -------------------------------------------------------
[functions.news-agent]
verify_jwt = false

# Note: Supabase schedules cron via pg_cron in the migration SQL.
# See supabase/migrations/20240410000000_init.sql
